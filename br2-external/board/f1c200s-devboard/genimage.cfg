image boot.vfat {
	vfat {
		files = {
			"zImage",
			"suniv-f1c200s-devboard.dtb",
			"boot.scr"
		}
	}

	size = 16M
}

image sdcard.img {
	hdimage {
	}

	partition spl {
		in-partition-table = "no"
		image = "u-boot-sunxi-with-spl.bin"
		offset = 8K
		size = 1016K
	}

	partition boot {
		partition-type = 0xC
		bootable = "true"
		image = "boot.vfat"
		offset = 1M
	}

	partition rootfs {
		partition-type = 0x83
		image = "rootfs.ext2"
	}
}
